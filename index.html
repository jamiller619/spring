<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="UTF-8">
    <title>Spring - A minimal new tab page for Google Chrome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="images/icon.png">
    <link rel="stylesheet" type="text/css" href="stylesheets/style.css" media="screen">
    <link rel="import" href="bower_components/components.spring.clock/spring-clock.html">
  </head>
  <body>
    <main class="main">
      <h1><img class="logo" alt="Spring" src="images/spring-logo.svg" /></h1>
      <h2>A minimal new tab page for Google Chrome</h2>
      <a class="btn" href="https://chrome.google.com/webstore/detail/spring/lcomlokgcbklomfecjjpjlncapnhepbl?hl=en-US">Get Spring for Chrome</a>
      <p>A new tab page that knows its place in the world and won’t get in your way.</p>
      <p>Featuring a beautiful clock design inspired by <a href="http://www.ziiiro.com/">Ziiiro</a> and full-screen photos from <a href="http://www.unsplash.com">Unsplash</a>.</p>
      <div class="footer"><a href="http://www.designbypaperjam.com">A project by <img alt="paperjam" src="images/paperjam-logo.svg" /></a></div>
      <div class="bg-container">
        <div class="background"></div>
      </div>
    </main>
    <div class="demo">
      <div class="chrome">
        <spring-clock data-size="25"></spring-clock>
        <div class="background"></div>
      </div>
    </div>
  </body>
</html>
